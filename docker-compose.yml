  # ═══════════════════════════════════════════════════════════════════════
  # MICROSERVICES
  # ═══════════════════════════════════════════════════════════════════════

  # ── API Gateway ────────────────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: fleet-gateway
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      JWT_PUBLIC_KEY_PATH: /run/secrets/jwt_public
      KAFKA_BROKERS: kafka:9092
      REDIS_ADDR: redis:6379
      CORS_ALLOWED_ORIGINS: "http://localhost:3001,http://localhost:3002"
    secrets: [jwt_public]
    networks: [fleet]
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health/gateway"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── M01 Live Tracking ──────────────────────────────────────────────────
  m01-live-tracking:
    build:
      context: .
      dockerfile: services/m01-live-tracking/Dockerfile
    container_name: fleet-m01
    ports:
      - "4001:4001"
    environment:
      PORT: "4001"
      DATABASE_URL: postgres://fleet:${POSTGRES_PASSWORD_M01:?POSTGRES_PASSWORD_M01 is required}@postgres-m01:5432/fleet_tracking_db?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      REDIS_ADDR: redis:6379
      MQTT_BROKER: tcp://mosquitto:1883
    networks: [fleet]
    depends_on:
      postgres-m01:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mosquitto:
        condition: service_started
    restart: unless-stopped
    healthcheck: &svc_health
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4001/health"]
      interval: 15s
      timeout: 5s
      retries: 5

