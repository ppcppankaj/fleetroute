
# ── GPS Fleet SaaS — Full Production Stack ─────────────────────────────────
# Usage:
#   docker compose up -d           # start everything
#   docker compose up --build -d   # rebuild + start
#   docker compose down -v         # stop + wipe volumes
#
# Ports:
#   3000  API Gateway
#   3001  Tenant Frontend
#   3002  Admin Panel (Next.js)
#   4001-4017  Microservices
#   9090  Prometheus | 3100  Grafana

networks:
  fleet:
    driver: bridge

volumes:
  # Per-service Postgres volumes
  pgdata_m01:
  pgdata_m02:
  pgdata_m03:
  pgdata_m04:
  pgdata_m05:
  pgdata_m06:
  pgdata_m07:
  pgdata_m08:
  pgdata_m09:
  pgdata_m10:
  pgdata_m11:
  pgdata_m12:
  pgdata_m13:
  pgdata_m14:
  pgdata_m15:
  pgdata_m16:
  pgdata_m17:

  # Infra volumes
  redis_data:
  kafka_data:
  zookeeper_data:
  zookeeper_log:
  minio_data:
  prometheus_data:
  grafana_data:
  loki_data:

secrets:
  jwt_private:
    file: ./secrets/jwt_private.pem
  jwt_public:
    file: ./secrets/jwt_public.pem

# ═══════════════════════════════════════════════════════════════════════════
# INFRASTRUCTURE
# ═══════════════════════════════════════════════════════════════════════════
services:

  # ── Zookeeper ──────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: fleet-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    ports:
      - "2181:2181"
    networks: [fleet]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Kafka ──────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: fleet-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "9092:9092"
      - "29092:29092"
    networks: [fleet]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Redis ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fleet-redis
    command: redis-server --save 60 1 --loglevel warning --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks: [fleet]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── MQTT Broker (Eclipse Mosquitto) ────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: fleet-mosquitto
    volumes:
      - ./infra/mosquitto:/mosquitto/config:ro
    ports:
      - "1883:1883"
      - "9001:9001"
    networks: [fleet]
    restart: unless-stopped

  # ── MinIO Object Storage ───────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: fleet-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9091:9001"
    networks: [fleet]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ── Loki (Log Aggregation) ─────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.0
    container_name: fleet-loki
    ports:
      - "3200:3100"
    volumes:
      - loki_data:/loki
    networks: [fleet]
    restart: unless-stopped

  # ── Promtail (Log Shipper) ─────────────────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.0
    container_name: fleet-promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./infra/promtail/config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks: [fleet]
    restart: unless-stopped

  # ── Prometheus ─────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: fleet-prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    networks: [fleet]
    restart: unless-stopped

  # ── Grafana ────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    container_name: fleet-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_FEATURE_TOGGLES_ENABLE: tempoSearch,tempoBackendSearch
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3100:3000"
    networks: [fleet]
    depends_on: [prometheus, loki]
    restart: unless-stopped

