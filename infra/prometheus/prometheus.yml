global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'fleet-local'
    env: 'dev'

scrape_configs:

  # ── API Gateway ───────────────────────────────────────────────────────
  - job_name: 'gateway'
    metrics_path: /metrics
    static_configs:
      - targets: ['gateway:3000']
        labels: { service: gateway }

  # ── Microservices ─────────────────────────────────────────────────────
  - job_name: 'm01-live-tracking'
    metrics_path: /metrics
    static_configs:
      - targets: ['m01-live-tracking:4001']
        labels: { service: m01-live-tracking }

  - job_name: 'm02-routes-trips'
    metrics_path: /metrics
    static_configs:
      - targets: ['m02-routes-trips:4002']
        labels: { service: m02-routes-trips }

  - job_name: 'm03-geofencing'
    metrics_path: /metrics
    static_configs:
      - targets: ['m03-geofencing:4003']
        labels: { service: m03-geofencing }

  - job_name: 'm04-alerts'
    metrics_path: /metrics
    static_configs:
      - targets: ['m04-alerts:4004']
        labels: { service: m04-alerts }

  - job_name: 'm05-reports'
    metrics_path: /metrics
    static_configs:
      - targets: ['m05-reports:4005']
        labels: { service: m05-reports }

  - job_name: 'm06-vehicles'
    metrics_path: /metrics
    static_configs:
      - targets: ['m06-vehicles:4006']
        labels: { service: m06-vehicles }

  - job_name: 'm07-drivers'
    metrics_path: /metrics
    static_configs:
      - targets: ['m07-drivers:4007']
        labels: { service: m07-drivers }

  - job_name: 'm08-maintenance'
    metrics_path: /metrics
    static_configs:
      - targets: ['m08-maintenance:4008']
        labels: { service: m08-maintenance }

  - job_name: 'm09-fuel'
    metrics_path: /metrics
    static_configs:
      - targets: ['m09-fuel:4009']
        labels: { service: m09-fuel }

  - job_name: 'm10-multi-tenant'
    metrics_path: /metrics
    static_configs:
      - targets: ['m10-multi-tenant:4010']
        labels: { service: m10-multi-tenant }

  - job_name: 'm11-users-access'
    metrics_path: /metrics
    static_configs:
      - targets: ['m11-users-access:4011']
        labels: { service: m11-users-access }

  - job_name: 'm12-devices'
    metrics_path: /metrics
    static_configs:
      - targets: ['m12-devices:4012']
        labels: { service: m12-devices }

  - job_name: 'm13-security'
    metrics_path: /metrics
    static_configs:
      - targets: ['m13-security:4013']
        labels: { service: m13-security }

  - job_name: 'm14-billing'
    metrics_path: /metrics
    static_configs:
      - targets: ['m14-billing:4014']
        labels: { service: m14-billing }

  - job_name: 'm15-admin-panel'
    metrics_path: /metrics
    static_configs:
      - targets: ['m15-admin-panel:4015']
        labels: { service: m15-admin-panel }

  - job_name: 'm16-activity-log'
    metrics_path: /metrics
    static_configs:
      - targets: ['m16-activity-log:4016']
        labels: { service: m16-activity-log }

  - job_name: 'm17-roadmap'
    metrics_path: /metrics
