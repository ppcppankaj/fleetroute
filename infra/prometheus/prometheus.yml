  # ── Infrastructure ─────────────────────────────────────────────────────
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
        labels: { service: redis }

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels: { service: prometheus }
