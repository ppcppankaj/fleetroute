global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'gpsgo-local'
    env: 'dev'

# Alertmanager (optional — wire up later)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

scrape_configs:

  # ── Application services ─────────────────────────────────────────────────
  - job_name: 'ingestion-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['ingestion:9090']
        labels:
          service: ingestion-service

  - job_name: 'stream-processor'
    metrics_path: /metrics
    static_configs:
      - targets: ['stream-processor:9091']
        labels:
          service: stream-processor

  - job_name: 'api-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['api:9092']
        labels:
          service: api-service

  - job_name: 'websocket-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['websocket:9093']
        labels:
          service: websocket-service

  - job_name: 'maintenance-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['maintenance:9094']
        labels:
          service: maintenance-service

  - job_name: 'report-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['report:9095']
        labels:
          service: report-service

  - job_name: 'gateway'
    metrics_path: /metrics
    static_configs:
      - targets: ['gateway:9096']
        labels:
          service: gateway

  - job_name: 'admin-panel'
    metrics_path: /metrics
    static_configs:
      - targets: ['admin-panel:9097']
        labels:
          service: admin-panel

  # ── Infrastructure ────────────────────────────────────────────────────────
  - job_name: 'nats'
    static_configs:
      - targets: ['nats:7777']
        labels:
          service: nats

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis:9121']
        labels:
          service: redis

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['timescaledb:9187']
        labels:
          service: timescaledb

  # ── Self-monitoring ───────────────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: prometheus
