apiVersion: v2
name: fleetos
description: FleetOS GPS Fleet Management Platform — full Helm chart
type: application
version: 1.0.0
appVersion: "1.0.0"

dependencies:
  - name: postgresql
    version: "14.3.3"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: redis
    version: "19.5.5"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  - name: nats
    version: "1.2.4"
    repository: "https://nats-io.github.io/k8s/helm/charts/"
    condition: nats.enabled
