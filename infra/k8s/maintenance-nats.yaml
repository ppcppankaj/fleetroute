---
# ── Maintenance Service ────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: maintenance-service
  namespace: gpsgo
  labels:
    app: maintenance-service
    tier: domain
spec:
  replicas: 2
  selector:
    matchLabels:
      app: maintenance-service
  template:
    metadata:
      labels:
        app: maintenance-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8084"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: maintenance-service
        image: gpsgo-maintenance:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8084
        envFrom:
        - configMapRef:
            name: gpsgo-config
        - secretRef:
            name: gpsgo-secrets
        env:
        - name: PORT
          value: "8084"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8084
          initialDelaySeconds: 15
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8084
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: maintenance-service
  namespace: gpsgo
  labels:
    app: maintenance-service
spec:
  selector:
    app: maintenance-service
  ports:
  - name: http
    port: 8084
    targetPort: 8084
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: maintenance-service-hpa
  namespace: gpsgo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: maintenance-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 65
---
# ── NATS JetStream (message bus replacing Kafka for edge cases) ───────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  namespace: gpsgo
  labels:
    app: nats
spec:
  serviceName: nats
  replicas: 3
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
      - name: nats
        image: nats:2.10-alpine
        command:
        - nats-server
        - --cluster_name
        - gpsgo
        - --jetstream
        - --store_dir
        - /data
        - --cluster
        - nats://0.0.0.0:6222
        - --routes
        - nats://nats-0.nats:6222,nats://nats-1.nats:6222,nats://nats-2.nats:6222
        ports:
        - name: client
          containerPort: 4222
        - name: cluster
          containerPort: 6222
        - name: monitor
          containerPort: 8222
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: gpsgo
spec:
  clusterIP: None
  selector:
    app: nats
  ports:
  - name: client
    port: 4222
  - name: cluster
    port: 6222
  - name: monitor
    port: 8222
---
# ── Ingress for maintenance service ──────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gpsgo-api-ingress
  namespace: gpsgo
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.gpsgo.io
    secretName: gpsgo-tls
  rules:
  - host: api.gpsgo.io
    http:
      paths:
      - path: /api/v1(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: api-service
            port:
              number: 8080
      - path: /ws(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: websocket-service
            port:
              number: 8081
      - path: /maintenance(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: maintenance-service
            port:
              number: 8084
---
# ── ConfigMap for shared service config ──────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: gpsgo-config
  namespace: gpsgo
data:
  DATABASE_URL: "postgres://gpsgo:$(POSTGRES_PASSWORD)@postgres-primary:5432/gpsgo"
  NATS_URL: "nats://nats:4222"
  REDIS_URL: "redis://redis-master:6379"
  LOG_LEVEL: "info"
  GIN_MODE: "release"
  METRICS_PORT: "9090"
  ALLOWED_ORIGINS: "https://app.gpsgo.io,https://admin.gpsgo.io"
